<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080810">
<title>Test Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#00f0a0;--bg:#080810;--bg2:#0f0f1c;--text:#eeeef8;--text3:#44445a;--red:#ff4466;--mono:'IBM Plex Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#camBox{position:relative;flex:1;background:#000;overflow:hidden}
#video{width:100%;height:100%;object-fit:cover;display:block}
.ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.ov-box{width:75%;aspect-ratio:2.5/1;position:relative}
.ov-box::before,.ov-box::after,.ov-box .c2::before,.ov-box .c2::after{content:'';position:absolute;width:24px;height:24px;border-color:var(--accent);border-style:solid}
.ov-box::before{top:0;left:0;border-width:3px 0 0 3px}
.ov-box::after{top:0;right:0;border-width:3px 3px 0 0}
.ov-box .c2::before{bottom:0;left:0;border-width:0 0 3px 3px}
.ov-box .c2::after{bottom:0;right:0;border-width:0 3px 3px 0}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:sc 2s ease-in-out infinite}
@keyframes sc{0%{top:5%}100%{top:95%}}
.hint{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.08em}
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .06s}
.flash.on{opacity:.4}
#panel{background:var(--bg2);padding:16px;flex-shrink:0;min-height:120px}
#status{font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:8px;min-height:16px}
#result{font-size:18px;font-weight:600;color:var(--accent);font-family:var(--mono);word-break:break-all;min-height:28px}
#prodName{font-size:14px;color:var(--text);margin-top:6px;min-height:20px}
#method{font-size:10px;color:var(--text3);margin-top:4px}
#startBtn{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px}
</style>
</head>
<body>
<div id="camBox" style="display:none">
  <video id="video" playsinline autoplay muted></video>
  <div class="ov"><div class="ov-box"><div class="c2"></div><div class="scan-line"></div></div></div>
  <div class="hint">APUNTÁ AL CÓDIGO DE BARRAS</div>
  <div class="flash" id="flash"></div>
</div>

<div id="panel">
  <button id="startBtn" onclick="startScanner()">📷 ACTIVAR ESCÁNER</button>
  <div id="status">Tocá para iniciar</div>
  <div id="result">—</div>
  <div id="prodName"></div>
  <div id="method"></div>
</div>

<script>
let stream = null;
let detecting = false;
let lastCode = null;

// Elementos
const video    = document.getElementById('video');
const camBox   = document.getElementById('camBox');
const panel    = document.getElementById('panel');
const status   = document.getElementById('status');
const result   = document.getElementById('result');
const prodName = document.getElementById('prodName');
const methEl   = document.getElementById('method');
const flash    = document.getElementById('flash');
const startBtn = document.getElementById('startBtn');

async function startScanner() {
  startBtn.style.display = 'none';
  status.textContent = 'Iniciando cámara...';

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { exact: 'environment' },
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
      }
    });
    video.srcObject = stream;
    await video.play();
    camBox.style.display = 'block';
    panel.style.minHeight = 'auto';

    // Detectar método disponible
    if ('BarcodeDetector' in window) {
      status.textContent = '✓ BarcodeDetector nativo activo';
      methEl.textContent = 'Motor: BarcodeDetector API (nativo Android/Chrome)';
      startBarcodeDetector();
    } else {
      status.textContent = '⚠ BarcodeDetector no disponible — usando canvas fallback';
      methEl.textContent = 'Motor: canvas + ZXing fallback';
      startCanvasFallback();
    }
  } catch(e) {
    status.textContent = '❌ Error cámara: ' + e.message;
    startBtn.style.display = 'block';
  }
}

// MÉTODO 1: BarcodeDetector nativo (Chrome Android >= 83)
async function startBarcodeDetector() {
  const detector = new BarcodeDetector({
    formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39', 'qr_code']
  });

  detecting = true;
  let frameCount = 0;

  async function detect() {
    if (!detecting) return;
    frameCount++;

    try {
      const barcodes = await detector.detect(video);
      if (barcodes.length > 0) {
        const code = barcodes[0].rawValue;
        const fmt  = barcodes[0].format;
        if (code !== lastCode) {
          lastCode = code;
          doFlash();
          status.textContent  = `✓ Detectado (${fmt}) — frame #${frameCount}`;
          result.textContent  = code;
          prodName.textContent = 'Buscando...';
          await buscarProducto(code);
          setTimeout(() => lastCode = null, 3000);
        }
      } else {
        if (frameCount % 30 === 0) {
          status.textContent = `Escaneando... (frame #${frameCount})`;
        }
      }
    } catch(e) {
      status.textContent = 'Error detect: ' + e.message;
    }
    requestAnimationFrame(detect);
  }
  detect();
}

// MÉTODO 2: Canvas + ZXing (fallback para iOS / browsers viejos)
function startCanvasFallback() {
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
  script.onload = () => {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.CODE_128,
    ]);
    const reader = new ZXing.BrowserMultiFormatReader(hints, 500);
    reader.decodeFromVideoElement(video, async (res, err) => {
      if (res) {
        const code = res.getText();
        if (code !== lastCode) {
          lastCode = code;
          doFlash();
          status.textContent = '✓ ZXing detectó: ' + res.getBarcodeFormat();
          result.textContent  = code;
          await buscarProducto(code);
          setTimeout(() => lastCode = null, 3000);
        }
      }
    });
  };
  document.head.appendChild(script);
}

async function buscarProducto(code) {
  // Abrir IndexedDB de la app principal
  const req = indexedDB.open('stockscan_v4', 1);
  req.onsuccess = e => {
    const db  = e.target.result;
    if (!db.objectStoreNames.contains('prods')) {
      prodName.textContent = '(base de datos vacía)';
      return;
    }
    const tx  = db.transaction('prods','readonly');
    const idx = tx.objectStore('prods').index('bc');
    const r   = idx.get(code);
    r.onsuccess = ev => {
      const p = ev.target.result;
      prodName.textContent = p ? '📦 ' + p.n : '❌ No encontrado en catálogo';
    };
  };
  req.onerror = () => { prodName.textContent = '(sin DB)'; };
}

function doFlash() {
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 150);
}
</script>
</body>
</html>
